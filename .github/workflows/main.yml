name: BlueSquare Daily Marketing Bot

on:
  schedule:
    - cron: '0 0,6 * * *' # 매일 오전 9시, 오후 3시(KST) 자동 실행
  workflow_dispatch: # 수동 실행 가능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai PyGithub beautifulsoup4 requests

      - name: Run Marketing Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python bluesquare_automation.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "BlueSquare-Bot"
          git config --global user.email "bot@bluesquare.com"
          
          # 인증 정보 업데이트 (MY_GITHUB_TOKEN 사용)
          git remote set-url origin https://x-access-token:${{ secrets.MY_GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          git add _posts/*
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-post: Daily Catchtable Recommendation" && git push)
