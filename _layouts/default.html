<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
    <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
    <!-- Custom styling for BlueSquare blog -->
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        header { border-bottom: 2px solid #0056b3; padding-bottom: 20px; margin-bottom: 40px; }
        h1 { color: #0056b3; }
        .post-list { list-style: none; padding: 0; }
        .post-item { margin-bottom: 2rem; border-bottom: 1px dashed #ccc; padding-bottom: 1rem; }
        .post-date { color: #666; font-size: 0.9rem; }
        .post-link { font-size: 1.25rem; font-weight: bold; color: #0056b3; text-decoration: none; }
        .post-link:hover { text-decoration: underline; }
        footer { margin-top: 50px; padding: 20px 0; border-top: 1px solid #ddd; font-size: 0.9rem; color: #777; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/" style="text-decoration:none; color:inherit;">{{ site.title }}</a></h1>
        <p>{{ site.description }}</p>
    </header>

    {{ content }}

    <footer>
        <p>&copy; 2026 BlueSquare Marketing Automation. All rights reserved.</p>
    </footer>
</body>
</html>
